name: Release APK

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/lunaglow-release.jks"
      - name: Build signed release
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/lunaglow-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest assembleRelease
      - name: Verify and name APK
        run: |
          test -f app/build/outputs/apk/release/app-release.apk
          cp app/build/outputs/apk/release/app-release.apk lunaglow-rp6.apk
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose lunaglow-rp6.apk
          sha256sum lunaglow-rp6.apk > lunaglow-rp6.apk.sha256
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: |
            lunaglow-rp6.apk
            lunaglow-rp6.apk.sha256
